<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nocastra | Under Maintenance</title>
    <meta name="description" content="Nocastra is undergoing scheduled maintenance. We will be back soon.">
    <link rel="icon" type="image/png" href="Logo.png">

    <!-- Google Fonts: Outfit and Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* CSS Variables for Premium Light Design System */
        :root {
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent-indigo: #4f46e5;
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
        }

        /* Basic Resets */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--font-body);
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('Gemini_Generated_Image_fsrbdrfsrbdrfsrb.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: var(--text-primary);
        }

        /* Background blur & tint overlay for premium contrast */
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(248, 250, 252, 0.4);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 1;
        }

        /* Core Layout Wrapper */
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            z-index: 2;
        }

        /* Glassmorphic Central Card */
        .main-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 28px;
            padding: 4rem 3rem;
            text-align: center;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            animation: cardEntrance 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardEntrance {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Brand Identity Logo */
        .brand-logo-img {
            max-height: 70px;
            max-width: 250px;
            object-fit: contain;
            margin-bottom: 2rem;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.02));
        }

        /* Status Indicator */
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(79, 70, 229, 0.06);
            border: 1px solid rgba(79, 70, 229, 0.1);
            border-radius: 50px;
            padding: 6px 16px;
            margin-bottom: 1.5rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-indigo);
            border-radius: 50%;
            position: relative;
        }

        .status-dot::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--accent-indigo);
            border-radius: 50%;
            animation: pulseDot 2s infinite ease-in-out;
        }

        @keyframes pulseDot {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }
            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .status-text {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-indigo);
        }

        /* Headings & Descriptions */
        h1.title {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 2.25rem;
            line-height: 1.2;
            letter-spacing: -0.5px;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #0f172a 30%, var(--accent-indigo) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.description {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-secondary);
            margin: 0;
        }

        /* Responsive Breakpoints */
        @media (max-width: 640px) {
            .main-card {
                padding: 3rem 1.5rem;
            }

            h1.title {
                font-size: 1.85rem;
            }
        }
    </style>
</head>

<body>

    <!-- Background Tint & Blur Overlay -->
    <div class="bg-overlay"></div>

    <!-- Central Wrapper for centering elements -->
    <div class="wrapper">
        <main class="main-card">
            <!-- Header / Logo -->
            <header>
                <img src="nocastraLogo.png" alt="Nocastra Logo" class="brand-logo-img">
            </header>

            <!-- Status Indicator -->
            <div class="status-indicator">
                <span class="status-dot"></span>
                <span class="status-text">Under Maintenance</span>
            </div>

            <!-- Text Area -->
            <div id="ctaArea">
                <h1 class="title">We'll Be Back Soon</h1>
                <p class="description">
                    We are currently upgrading our platform to serve you better. We'll be back online shortly. Thank you for your patience!
                </p>
            </div>
        </main>
    </div>

</body>

</html>
