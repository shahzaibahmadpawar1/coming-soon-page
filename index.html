<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nocastra | Under Maintenance</title>
    <meta name="description" content="Nocastra is undergoing scheduled maintenance. We will be back soon.">
    <link rel="icon" type="image/png" href="Logo.png">

    <!-- Google Fonts: Outfit and Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* CSS Variables for Premium Light Design System */
        :root {
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent-indigo: #4f46e5;
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
        }

        /* Basic Resets */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            font-family: var(--font-body);
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* align content to top */
            background-image: url('Gemini_Generated_Image_fsrbdrfsrbdrfsrb.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: var(--text-primary);
            padding: 80px 24px; /* padding on top to keep text in white space above visuals */
        }

        /* Minimal Content Container */
        .content-container {
            width: 100%;
            max-width: 500px;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Brand Identity Logo */
        .brand-logo-img {
            max-height: 70px;
            max-width: 250px;
            object-fit: contain;
            margin-bottom: 2rem;
        }

        /* Status Indicator */
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(79, 70, 229, 0.06);
            border: 1px solid rgba(79, 70, 229, 0.1);
            border-radius: 50px;
            padding: 6px 16px;
            margin-bottom: 1.5rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-indigo);
            border-radius: 50%;
            position: relative;
        }

        .status-dot::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--accent-indigo);
            border-radius: 50%;
            animation: pulseDot 2s infinite ease-in-out;
        }

        @keyframes pulseDot {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }
            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .status-text {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-indigo);
        }

        /* Headings & Descriptions */
        h1.title {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 2.5rem;
            line-height: 1.2;
            letter-spacing: -0.5px;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #0f172a 30%, var(--accent-indigo) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.description {
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--text-secondary);
            margin: 0;
        }

        /* Responsive Breakpoints */
        @media (max-width: 640px) {
            body {
                padding: 50px 20px;
            }

            h1.title {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <!-- Central Wrapper for centering elements -->
    <div class="content-container">
        <!-- Header / Logo -->
        <header>
            <img src="nocastraLogo.png" alt="Nocastra Logo" class="brand-logo-img">
        </header>

        <!-- Status Indicator -->
        <div class="status-indicator">
            <span class="status-dot"></span>
            <span class="status-text">Under Maintenance</span>
        </div>

        <!-- Text Area -->
        <div id="ctaArea">
            <h1 class="title">We'll Be Back Soon</h1>
            <p class="description">
                We are currently upgrading our platform to serve you better. We'll be back online shortly. Thank you for your patience!
            </p>
        </div>
    </div>

</body>

</html>
