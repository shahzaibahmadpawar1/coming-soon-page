<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nocastra | Under Maintenance</title>
    <meta name="description" content="Nocastra is undergoing scheduled maintenance. We will be back soon.">
    <link rel="icon" type="image/png" href="Logo.png">

    <!-- Google Fonts: Outfit and Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* CSS Variables for Premium Light Design System */
        :root {
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.75);
            --card-border: rgba(226, 232, 240, 0.8);

            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;

            --accent-indigo: #4f46e5;
            --accent-cyan: #06b6d4;
            --accent-pink: #db2777;
            --accent-glow: rgba(79, 70, 229, 0.08);

            --font-display: 'Outfit', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
        }

        /* Basic Resets */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--font-body);
            background-color: var(--bg-color);
            color: var(--text-primary);
        }

        /* Ambient Blob Background Layer */
        .bg-gradient-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 50% 50%, #ffffff, #f1f5f9);
            overflow: hidden;
        }

        .glow-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            z-index: -2;
            pointer-events: none;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, var(--accent-indigo), var(--accent-cyan));
            top: -150px;
            left: -100px;
            animation: floatBlob1 25s infinite alternate ease-in-out;
        }

        .blob-2 {
            width: 450px;
            height: 450px;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-indigo));
            bottom: -150px;
            right: -100px;
            animation: floatBlob2 20s infinite alternate ease-in-out;
        }

        @keyframes floatBlob1 {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(80px, 50px) scale(1.1); }
            100% { transform: translate(-30px, -60px) scale(0.9); }
        }

        @keyframes floatBlob2 {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-60px, 80px) scale(1.05); }
            100% { transform: translate(40px, -40px) scale(0.95); }
        }

        /* Canvas Overlay */
        #particles-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: auto;
        }

        /* Core Layout Wrapper */
        .wrapper {
            position: relative;
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 1;
            perspective: 1200px;
        }

        /* Glassmorphic Central Card */
        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 3.5rem 3rem;
            max-width: 540px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
            transform-style: preserve-3d;
            transition: transform 0.1s ease, box-shadow 0.3s ease;
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            animation: cardEntrance 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.1s;
        }

        .main-card:hover {
            box-shadow: 0 30px 60px rgba(15, 23, 42, 0.07),
                0 0 40px rgba(79, 70, 229, 0.04);
        }

        @keyframes cardEntrance {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Card Content Inner 3D Effects */
        .card-inner {
            transform: translateZ(50px);
        }

        /* Brand Identity Logo */
        .brand-logo-img {
            max-height: 65px;
            max-width: 260px;
            object-fit: contain;
            margin-bottom: 2rem;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.02));
        }

        /* Status Indicator */
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(79, 70, 229, 0.06);
            border: 1px solid rgba(79, 70, 229, 0.1);
            border-radius: 50px;
            padding: 6px 16px;
            margin-bottom: 1.5rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-indigo);
            border-radius: 50%;
            position: relative;
        }

        .status-dot::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--accent-indigo);
            border-radius: 50%;
            animation: pulseDot 2s infinite ease-in-out;
        }

        @keyframes pulseDot {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }
            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .status-text {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-indigo);
        }

        /* Headings & Descriptions */
        h1.title {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 2.5rem;
            line-height: 1.2;
            letter-spacing: -1px;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #0f172a 30%, var(--accent-indigo) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.description {
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--text-secondary);
            max-width: 440px;
            margin: 0 auto 2.5rem;
        }

        /* Footer Links */
        footer {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            opacity: 0;
            animation: fadeIn 1s ease forwards;
            animation-delay: 0.6s;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .social-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
            position: relative;
        }

        .social-link::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-indigo));
            transition: width 0.3s ease;
        }

        .social-link:hover {
            color: var(--accent-indigo);
        }

        .social-link:hover::after {
            width: 100%;
        }

        /* Responsive Breakpoints */
        @media (max-width: 640px) {
            .main-card {
                padding: 2.5rem 1.5rem;
            }

            h1.title {
                font-size: 2rem;
            }

            p.description {
                font-size: 0.95rem;
                margin-bottom: 2rem;
            }
        }
    </style>
</head>

<body>

    <!-- Dynamic Canvas Particle Layer -->
    <canvas id="particles-canvas"></canvas>

    <!-- Mesh Gradient Blob Background Layer -->
    <div class="bg-gradient-wrapper">
        <div class="glow-blob blob-1"></div>
        <div class="glow-blob blob-2"></div>
    </div>

    <!-- Central Wrapper for centering elements -->
    <div class="wrapper">
        <main class="main-card" id="cardContainer">
            <div class="card-inner">
                <!-- Header / Logo -->
                <header>
                    <img src="nocastraLogo.png" alt="Nocastra Logo" class="brand-logo-img">
                </header>

                <!-- Status Indicator -->
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span class="status-text">Under Maintenance</span>
                </div>

                <!-- Text Area -->
                <div id="ctaArea">
                    <h1 class="title">We'll Be Back Soon</h1>
                    <p class="description">
                        We are currently upgrading our platform to serve you better. We'll be back online shortly. Thank you for your patience!
                    </p>
                </div>

                <!-- Social Footer Links -->
                <footer>
                    <a href="#" class="social-link">Twitter</a>
                    <a href="#" class="social-link">Discord</a>
                    <a href="#" class="social-link">LinkedIn</a>
                </footer>
            </div>
        </main>
    </div>

    <script>
        // -------------------------------------------------------------
        // 1. Interactive 3D Card Tilt Effect
        // -------------------------------------------------------------
        const cardContainer = document.getElementById('cardContainer');
        const wrapper = document.querySelector('.wrapper');

        // Apply dynamic perspective rotation based on cursor location relative to viewport center
        wrapper.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.clientX) / 35;
            const yAxis = (window.innerHeight / 2 - e.clientY) / 35;
            cardContainer.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Smooth transition back to neutral posture when cursor departs
        wrapper.addEventListener('mouseleave', () => {
            cardContainer.style.transition = 'transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease';
            cardContainer.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        wrapper.addEventListener('mouseenter', () => {
            cardContainer.style.transition = 'transform 0.1s ease, box-shadow 0.3s ease';
        });

        // -------------------------------------------------------------
        // 2. Interactive Canvas Node-Link Particle System (Light-Themed)
        // -------------------------------------------------------------
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');

        let particleArray = [];
        let mousePosition = { x: null, y: null, radius: 140 };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        }

        window.addEventListener('resize', resizeCanvas);

        window.addEventListener('mousemove', (e) => {
            mousePosition.x = e.clientX;
            mousePosition.y = e.clientY;
        });

        window.addEventListener('mouseout', () => {
            mousePosition.x = null;
            mousePosition.y = null;
        });

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
                this.originalSize = size;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            update() {
                if (this.x > canvas.width || this.x < 0) {
                    this.directionX = -this.directionX;
                }
                if (this.y > canvas.height || this.y < 0) {
                    this.directionY = -this.directionY;
                }

                this.x += this.directionX;
                this.y += this.directionY;

                if (mousePosition.x !== null && mousePosition.y !== null) {
                    let dx = mousePosition.x - this.x;
                    let dy = mousePosition.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < mousePosition.radius) {
                        const forceDirectionX = dx / distance;
                        const forceDirectionY = dy / distance;
                        const force = (mousePosition.radius - distance) / mousePosition.radius;

                        this.x -= forceDirectionX * force * 3;
                        this.y -= forceDirectionY * force * 3;
                        this.size = Math.min(this.originalSize * 1.5, 3.5);
                    } else {
                        if (this.size > this.originalSize) {
                            this.size -= 0.05;
                        }
                    }
                }

                this.draw();
            }
        }

        function initParticles() {
            particleArray = [];
            const areaFactor = (canvas.width * canvas.height) / 15000;
            const targetCount = Math.min(Math.max(Math.floor(areaFactor), 30), 80);

            for (let i = 0; i < targetCount; i++) {
                const size = (Math.random() * 1.5) + 0.8;
                const x = Math.random() * (canvas.width - size * 2) + size * 2;
                const y = Math.random() * (canvas.height - size * 2) + size * 2;

                const directionX = (Math.random() * 0.4) - 0.2;
                const directionY = (Math.random() * 0.4) - 0.2;

                // Light themed pastel colors
                const colors = ['rgba(79, 70, 229, 0.15)', 'rgba(6, 182, 212, 0.15)', 'rgba(71, 85, 105, 0.1)'];
                const color = colors[Math.floor(Math.random() * colors.length)];

                particleArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        function connectParticles() {
            const maxConnectDistance = 115;
            for (let a = 0; a < particleArray.length; a++) {
                for (let b = a; b < particleArray.length; b++) {
                    const dx = particleArray[a].x - particleArray[b].x;
                    const dy = particleArray[a].y - particleArray[b].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < maxConnectDistance) {
                        const opacity = (1 - (distance / maxConnectDistance)) * 0.12;
                        ctx.strokeStyle = `rgba(79, 70, 229, ${opacity})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particleArray[a].x, particleArray[a].y);
                        ctx.lineTo(particleArray[b].x, particleArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animateParticles() {
            requestAnimationFrame(animateParticles);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < particleArray.length; i++) {
                particleArray[i].update();
            }
            connectParticles();
        }

        resizeCanvas();
        animateParticles();
    </script>
</body>

</html>
