<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nocastra | Under Maintenance</title>
    <meta name="description" content="Nocastra is undergoing scheduled maintenance. We will be back soon.">
    <link rel="icon" type="image/png" href="Logo.png">

    <!-- Google Fonts: Outfit and Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* CSS Variables for Premium Design System */
        :root {
            --text-primary: #ffffff;
            --text-secondary: #e2e8f0;
            --accent-indigo: #818cf8;
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
        }

        /* Basic Resets */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--font-body);
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('Gemini_Generated_Image_fsrbdrfsrbdrfsrb.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: var(--text-primary);
        }

        /* Subtle dark vignette overlay for legibility (no blur) */
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.35) 0%, rgba(15, 23, 42, 0.55) 100%);
            z-index: 1;
        }

        /* Core Layout Wrapper */
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 540px;
            padding: 20px;
            z-index: 2;
        }

        /* Minimalist container directly on background (no card block) */
        .main-card {
            background: transparent;
            border: none;
            padding: 2rem 1rem;
            text-align: center;
            box-shadow: none;
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            animation: cardEntrance 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardEntrance {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Brand Identity Logo */
        .brand-logo-img {
            max-height: 85px;
            max-width: 220px;
            object-fit: contain;
            margin-bottom: 2rem;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.3));
        }

        /* Status Indicator */
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            padding: 6px 18px;
            margin-bottom: 1.75rem;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #34d399; /* emerald green */
            border-radius: 50%;
            position: relative;
        }

        .status-dot::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #34d399;
            border-radius: 50%;
            animation: pulseDot 2s infinite ease-in-out;
        }

        @keyframes pulseDot {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }
            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .status-text {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        /* Headings & Descriptions */
        h1.title {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 2.75rem;
            line-height: 1.2;
            letter-spacing: -0.5px;
            margin-bottom: 1.25rem;
            background: linear-gradient(135deg, #ffffff 40%, #c7d2fe 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.2));
        }

        p.description {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-secondary);
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
            margin: 0;
        }

        /* Responsive Breakpoints */
        @media (max-width: 640px) {
            .main-card {
                padding: 1.5rem 0.5rem;
            }

            h1.title {
                font-size: 2.25rem;
            }

            p.description {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>

    <!-- Background Tint Overlay (No Blur) -->
    <div class="bg-overlay"></div>

    <!-- Central Wrapper for centering elements -->
    <div class="wrapper">
        <main class="main-card">
            <!-- Header / Logo -->
            <header>
                <img src="Logo.png" alt="Nocastra Logo" class="brand-logo-img">
            </header>

            <!-- Status Indicator -->
            <div class="status-indicator">
                <span class="status-dot"></span>
                <span class="status-text">Under Maintenance</span>
            </div>

            <!-- Text Area -->
            <div id="ctaArea">
                <h1 class="title">We'll Be Back Soon</h1>
                <p class="description">
                    We are currently upgrading our platform to serve you better. We'll be back online shortly. Thank you for your patience!
                </p>
            </div>
        </main>
    </div>

</body>

</html>
