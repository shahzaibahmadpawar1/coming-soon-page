# cPanel Git Deployment Configuration
# Guide: https://docs.cpanel.net/knowledge-base/web-services/guide-to-git-deployment/
#
# IMPORTANT: Replace 'YOUR_CPANEL_USERNAME' below with your actual cPanel username.
# You can find this in your cPanel dashboard (often under User Manager or Account Information).

---
deployment:
  tasks:
    - export DEPLOYPATH=/home/nocastra/public_html/
    - /bin/cp index.html $DEPLOYPATH
